<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: #fff; padding-top: 100px; }
        .btn { padding: 20px 40px; font-size: 24px; font-weight: bold; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn:active { background: #1d4ed8; }
        .status { margin-top: 20px; font-size: 18px; color: #10b981; display: none; }
    </style>
        <link rel="stylesheet" href="css/jeff-set.css">
        <link rel="stylesheet" href="css/logo-anim.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script src="js/logo-anim.js"></script>
</head>
<body>
    <div class="topbar">
        <a href="/" class="logo-mini">
            <svg class="logo-svg-mini" width="40" height="40" viewBox="0 0 140 140">
                <path class="logo-border" d="
                M5,5
                H135
                V105
                A30,30 0 0 1 105,135
                H5
                Z
              " />
                <text x="70" y="105" text-anchor="middle" font-size="90" font-family="'Rubik'" font-weight="700"
                    class="logo-j">J</text>
            </svg>
        </a>
        <form class="theme-toggle" autocomplete="off">
            <input type="checkbox" id="toggle-dark" aria-label="Toggle dark mode">
            <label for="toggle-dark" class="theme-toggle-label"></label>
        </form>
    </div>

    <h1>Криївка</h1>
    <br>
    <button class="btn" onclick="copyVless()">СКОПИРОВАТЬ VLESS-КЛЮЧ</button>
    <div id="status" class="status">✓ Скопировано в буфер обмена ТВ!</div>

    <script>
        function copyVless() {
            const vlessLink = "vless://b670c7ca-2472-4040-8314-019a0c2a754b@app.voxclear.cc:443?security=reality&encryption=none&headerType=none&fp=chrome&type=tcp&flow=xtls-rprx-vision&pbk=hiXLrNf0yVQNkheLR7WR_VohRMwxxfuyYzdWxf8xH0I&sni=www.microsoft.com&sid=6f31e2f3b86a#VPN_131_1777981226_8";
            
            navigator.clipboard.writeText(vlessLink).then(() => {
                const status = document.getElementById('status');
                status.style.display = 'block';
                setTimeout(() => { status.style.display = 'none'; }, 3000);
            }).catch(err => {
                alert("Ошибка копирования. Убедитесь, что у браузера есть разрешение на буфер обмена.");
            });
        }
    </script>
    <div class="footer-meta">
